<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/customer.css" />
</head>
<body>
  <div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
  </div>

  <header class="shop-header">
    <div class="container header-inner">
      <h1 class="shop-logo">Online Shop</h1>

     <nav class="shop-nav">
  <a href="home.html" class="nav-link">
    <span class="nav-icon">
      <img
        src="https://ik.imagekit.io/sri05/home.png"
        alt="Home"
        style="width: 18px; height: 18px; object-fit: contain;"
      />
    </span>
    <span>Home</span>
  </a>

  <a href="orders.html" class="nav-link">
    <span class="nav-icon">
      <img
        src="https://ik.imagekit.io/sri05/package.png"
        alt="Orders"
        style="width: 18px; height: 18px; object-fit: contain;"
      />
    </span>
    <span>Orders</span>
  </a>

  <a href="cart.html" class="nav-link cart-link active">
    <span class="nav-icon">
      <img
        src="https://ik.imagekit.io/sri05/shopping-bag.png"
        alt="Cart"
        style="width: 18px; height: 18px; object-fit: contain;"
      />
    </span>
    <span>Cart</span>
    <span id="cartCountBadge" class="cart-badge">0</span>
  </a>

  <button
    id="logoutBtn"
    class="btn btn-secondary btn-sm nav-logout"
    type="button"
  >
    Logout
  </button>
</nav>
    </div>
  </header>

  <section class="container" style="padding: 2rem 0;">
    <div class="card">
      <h1 style="margin-bottom: 1.5rem;">Checkout</h1>

      <div id="checkoutContainer"></div>
    </div>
  </section>

  <script type="module" src="../assets/js/customer/checkout.js"></script>
</body>
</html>
