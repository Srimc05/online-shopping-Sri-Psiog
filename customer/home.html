<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSIZOM | Handcrafted Shirts</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/customer.css" />
</head>
<body>
  <!-- Global Loader -->
  <div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
  </div>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="shop-header">
    <div class="container header-inner">
      <!-- Brand -->
      <a href="home.html" class="shop-brand">
        

        <div class="shop-brand-text">
          <h1 class="shop-logo">PSIZOM</h1>
          
        </div>
      </a>

      <!-- Navigation -->
      <nav class="shop-nav">
        <a href="home.html" class="nav-link active">
          <span class="nav-icon">🏠</span>
          <span>Home</span>
        </a>

        <a href="orders.html" class="nav-link">
          <span class="nav-icon">📦</span>
          <span>Orders</span>
        </a>

        <a href="cart.html" class="nav-link cart-link">
          <span class="nav-icon">🛒</span>
          <span>Cart</span>
          <span id="cartCountBadge" class="cart-badge">0</span>
        </a>

        <button
          id="logoutBtn"
          class="btn btn-secondary btn-sm nav-logout"
          type="button"
        >
          Logout
        </button>
      </nav>
    </div>
  </header>

  <!-- =========================
       HERO SECTION
  ========================== -->
 

  <!-- =========================
       FILTERS
  ========================== -->
  <section class="container" style="margin-top: 2rem;">
    <div class="filters-card">
      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search premium shirts..."
      />

      <select id="categoryFilter" class="form-control">
        <option value="">All Categories</option>
      </select>
    </div>
  </section>

  <!-- =========================
       PRODUCTS
  ========================== -->
  <section
    class="container"
    style="margin-top: 2rem; margin-bottom: 3rem;"
  >
    <div id="productsGrid" class="products-grid"></div>

    <div
      id="paginationContainer"
      class="pagination"
    ></div>
  </section>

  <!-- =========================
       SCRIPT
  ========================== -->
  <script type="module" src="../assets/js/customer/home.js"></script>

  <!-- =========================
       CART BADGE SCRIPT
  ========================== -->
  <script type="module">
  import { observeAuth } from "../assets/js/auth.js";
  import { getCart } from "../assets/js/services/cart-service.js";

  async function updateCartBadge() {
    const badge = document.getElementById("cartCountBadge");

    if (!badge) return;

    try {
      const cart = await getCart();
      const items = cart?.items || [];

      const totalQty = items.reduce(
        (sum, item) =>
          sum + Number(item.quantity || 0),
        0
      );

      badge.textContent = totalQty;
      badge.style.display =
        totalQty > 0 ? "inline-flex" : "none";
    } catch (error) {
      console.error(
        "Failed to load cart count:",
        error
      );

      badge.style.display = "none";
    }
  }

  // Make globally accessible
  window.updateCartBadge = updateCartBadge;

  // Wait until Firebase auth is ready
  observeAuth((user) => {
    if (user) {
      updateCartBadge();
    }
  });
</script>
</body>
</html>
