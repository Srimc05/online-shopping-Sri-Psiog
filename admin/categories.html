<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2 class="sidebar-logo">Shop Admin</h2>

      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="categories.html" class="active">Categories</a>
        <a href="products.html">Products</a>
        <a href="customers.html">Customers</a>
        <a href="reports.html">Reports</a>
      </nav>

      <button id="logoutBtn" class="btn btn-secondary sidebar-logout">
        Logout
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Categories</h1>
        <p>Manage product categories.</p>
      </div>

      <!-- Add/Edit Form -->
      <div class="card" style="margin-bottom: 2rem;">
        <h3 style="margin-bottom: 1rem;">Add Category</h3>

        <form id="categoryForm">
          <input type="hidden" id="categoryId" />

          <div class="form-group">
            <label class="form-label">Category Name</label>
            <input
              type="text"
              id="categoryName"
              class="form-control"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea
              id="categoryDescription"
              class="form-control"
              rows="3"
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary">
            Save Category
          </button>
        </form>
      </div>

      <!-- Categories Table -->
      <div class="card">
        <h3 style="margin-bottom: 1rem;">Category List</h3>

        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Description</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="categoriesTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/admin/categories.js"></script>
</body>
</html>
