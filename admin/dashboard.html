<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <div id="globalLoader" class="loader-overlay">
    <div class="spinner"></div>
  </div>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2 class="sidebar-logo">Shop Admin</h2>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="categories.html">Categories</a>
        <a href="products.html">Products</a>
        <a href="customers.html">Customers</a>
        <a href="reports.html">Reports</a>
      </nav>

      <button id="logoutBtn" class="btn btn-secondary sidebar-logout">
        Logout
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Dashboard</h1>
        <p>Overview of your online shopping system.</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Products</h3>
          <p id="totalProducts">0</p>
        </div>

        <div class="stat-card">
          <h3>Total Customers</h3>
          <p id="totalCustomers">0</p>
        </div>

        <div class="stat-card">
          <h3>Total Orders</h3>
          <p id="totalOrders">0</p>
        </div>

        <div class="stat-card">
          <h3>Total Sales</h3>
          <p id="totalSales">₹0</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/admin/dashboard.js"></script>
</body>
</html>
