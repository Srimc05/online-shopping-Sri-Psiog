<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2 class="sidebar-logo">Shop Admin</h2>

      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="categories.html">Categories</a>
        <a href="products.html" class="active">Products</a>
        <a href="customers.html">Customers</a>
        <a href="reports.html">Reports</a>
      </nav>

      <button id="logoutBtn" class="btn btn-secondary sidebar-logout">
        Logout
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Products</h1>
        <p>Manage inventory items.</p>
      </div>

      <!-- Product Form -->
      <div class="card" style="margin-bottom: 2rem;">
        <h3 style="margin-bottom: 1rem;">Add Product</h3>

        <form id="productForm">
          <input type="hidden" id="productId" />

          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="productCategory" class="form-control" required>
              <option value="">Select Category</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Product Title</label>
            <input
              type="text"
              id="productTitle"
              class="form-control"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea
              id="productDescription"
              class="form-control"
              rows="3"
            ></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Quantity</label>
            <input
              type="number"
              id="productQuantity"
              class="form-control"
              min="0"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Price (₹)</label>
            <input
              type="number"
              id="productPrice"
              class="form-control"
              min="0"
              step="0.01"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Image URL</label>
            <input
              type="url"
              id="productImage"
              class="form-control"
            />
          </div>

          <button type="submit" class="btn btn-primary">
            Save Product
          </button>
        </form>
      </div>

      <!-- Products Table -->
      <div class="card">
        <h3 style="margin-bottom: 1rem;">Product List</h3>

        <table class="table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Category</th>
              <th>Qty</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/admin/products.js"></script>
</body>
</html>
